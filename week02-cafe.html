<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CAFE MENU</title>
</head>
<body>
<header class="bg-stone-200">
    <h1 class="text-yellow-700 mx-auto w-full text-center text-4xl font-bold m-4 underline">CAFE MENU</h1>
    <p class="mx-auto w-full text-center">~ユートピアにひっそりと佇む古民家カフェ~</p>
</header>
<main class="max-w-2xl mx-auto px-4 py-8">
<section>
    <h2 class="text-yellow-700 text-4xl mb-2">おすすめメニュー</h2>

    <div class="hover:bg-stone-100 rounded-lg shadow p-6 mb-4 flex flex-row items-center gap-20">
        <div class="flex flex-col">
            <h3 class="text-lg font-bold text-gray-900 ">季節のパンケーキ</h3>
            <p class="text-gray-600 mt-1">時期によって旬のフルーツをふんだんに使用しています</p>
            <p class="text-yellow-600 font-bold mt-2">￥1500～</p>
        </div>
            <img src="./img/イチゴのパンケーキ.jpg" alt="パンケーキの写真" class="w-40 h-30 object-cover rounded-md">
        
    </div>

    <div class="hover:bg-stone-100 rounded-lg shadow p-6 mb-4 flex flex-row items-center gap-20">
        <div>
            <h3 class="text-lg font-bold text-gray-900">季節のドリンク</h3>
            <p class="text-gray-600 mt-1">自社直営農園で育てたフレッシュなフルーツを使用しています</p>
            <p class="text-yellow-600 font-bold mt-2">￥700円～</p>
        </div>
        <img src="./img/イチゴミルク.jpg" alt="イチゴミルクの写真" class="w-40 h-30 object-cover rounded-md">
    </div>
    </section>

</main>
    

</body>
</html>
